services:
  db:
    image: postgres:16-alpine
    container_name: lifttrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifttrack
      POSTGRES_USER: lifttrack
      POSTGRES_PASSWORD: lifttrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifttrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lifttrack-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lifttrack
      SPRING_DATASOURCE_USERNAME: lifttrack
      SPRING_DATASOURCE_PASSWORD: lifttrack
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: lifttrack-web
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  postgres_data:
