spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifttrack}
    username: ${SPRING_DATASOURCE_USERNAME:lifttrack}
    password: ${SPRING_DATASOURCE_PASSWORD:lifttrack}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
