name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build

      - name: Run tests
        run: gradle test
