services:
  db:
    image: postgres:16
    container_name: lifttrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifttrack
      POSTGRES_USER: lifttrack
      POSTGRES_PASSWORD: lifttrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifttrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
